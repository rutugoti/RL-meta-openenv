[project]
name = "data-cleaning-env"
version = "0.1.0"
description = "Data cleaning RL environment"
authors = [
    { name = "Your Name" }
]
requires-python = ">=3.10"
dependencies = [
    "pandas==2.2.2",
    "numpy==1.26.4",
    "pydantic==2.7.1",
    "fastapi==0.111.0",
    "uvicorn==0.29.0",
    "openai==1.30.1",
    "openenv",
    "pytest==8.2.0",
    "httpx==0.27.0"
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"